name: Deploy Website with Interact

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to checkout (tag: vx.x.x or early-access, or branch name)'
        required: true
        type: string
        default: 'main'

  # Trigger on tag push
  push:
    # A tag is a commit name (as a branch)
    # We can't filter by default if a branch contains a tag
    tags:
      - 'v*'
      - 'early-access'


# Allow only one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  APP_DIR: ./apps/site

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}
          fetch-depth: 0

      - name: Enable Corepack
        run: corepack enable

      # Runs a single command using the runners shell
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'  # caches yarn dependencies automatically

      # equivalent to npm ci
      - name: Install dependencies from the lockfile
        run: |
          yarn install --immutable

      - name: Check bin
        # GitHub Actions adds node_modules/.bin to the PATH automatically
        run: ls -la node_modules/.bin

      - name: Build the interact cli
        run: yarn build

      - name: Build the components registry and website
        run: |
          yarn registry
          ./node_modules/.bin/interact build --confPath=${{ env.APP_DIR }}

      # actions/deploy-pages expect a zip
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.APP_DIR }}/dist/client

  # https://github.com/actions/deploy-pages
  deploy:
    needs: build
    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    runs-on: ubuntu-latest

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
